<!doctype html>
<html lang="en" data-theme="abschluss-light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <title>Bodo's Multiple Choice</title>
  <script>
    (function() {
      var t = localStorage.getItem('theme')
        || (matchMedia('(prefers-color-scheme:dark)').matches ? 'abschluss-dark' : 'abschluss-light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
